<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#0a0a0a" />
<title>골프 기록원 · GPS 샷 거리</title>
<style>
  :root{
    --green:#34c759; --green-d:#248a3d; --blue:#007aff; --orange:#ff9f0a; --red:#ff3b30; --gold:#ffcc00;
    --ink:#1c1c1e; --ink2:#3a3a3c; --gray:#8e8e93; --hair:rgba(0,0,0,.08);
    --glass:rgba(255,255,255,.72); --glass-strong:rgba(255,255,255,.86);
    --shadow:0 10px 40px rgba(0,0,0,.18), 0 2px 8px rgba(0,0,0,.10);
    --r:22px; --r2:14px;
  }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{ margin:0; height:100%; background:#0a0a0a; color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","SF Pro Display","Apple SD Gothic Neo","Pretendard",system-ui,sans-serif;
    font-size:15px; line-height:1.35; letter-spacing:-.01em; }
  #app{ display:flex; flex-direction:column; height:100%; }

  /* ───── 상단 바 ───── */
  header{ position:relative; z-index:80; display:flex; align-items:center; gap:12px; padding:max(10px,env(safe-area-inset-top)) 16px 10px;
    background:var(--glass-strong); backdrop-filter:saturate(180%) blur(20px); -webkit-backdrop-filter:saturate(180%) blur(20px);
    border-bottom:.5px solid var(--hair); }
  .title{ display:flex; flex-direction:column; line-height:1.05; }
  .title b{ font-size:17px; font-weight:700; letter-spacing:-.02em; }
  .title span{ font-size:11px; color:var(--gray); font-weight:500; }
  .title a{ color:var(--blue); text-decoration:none; }
  .grow{ flex:1; }

  /* iOS 세그먼트 컨트롤 */
  .seg{ display:inline-flex; background:rgba(118,118,128,.12); border-radius:11px; padding:2px; gap:2px; }
  .seg button{ border:none; background:transparent; color:var(--ink2); font:inherit; font-weight:600; font-size:13px;
    padding:7px 16px; border-radius:9px; cursor:pointer; transition:.18s; }
  .seg button.active{ background:#fff; color:var(--ink); box-shadow:0 1px 4px rgba(0,0,0,.12), 0 1px 1px rgba(0,0,0,.04); }

  .icbtn{ width:38px; height:38px; border:none; border-radius:12px; background:rgba(118,118,128,.12); color:var(--ink);
    font-size:17px; cursor:pointer; display:grid; place-items:center; transition:.15s; }
  .icbtn:active{ transform:scale(.92); }

  #stage{ position:relative; flex:1; overflow:hidden; }
  #map{ position:absolute; inset:0; background:#1a1a1a; }
  .note{ position:absolute; inset:0; display:flex; align-items:center; justify-content:center; text-align:center; padding:30px;
    color:#fff; font-size:14px; line-height:1.7; background:#111; }
  .note code{ background:rgba(255,255,255,.14); padding:2px 7px; border-radius:6px; }

  /* ───── 글래스 패널 ───── */
  .panel{ position:absolute; left:14px; top:14px; z-index:60; width:316px; max-width:calc(100vw - 28px);
    max-height:calc(100% - 28px); overflow:auto; background:var(--glass); backdrop-filter:saturate(180%) blur(24px);
    -webkit-backdrop-filter:saturate(180%) blur(24px); border:.5px solid rgba(255,255,255,.5); border-radius:var(--r);
    box-shadow:var(--shadow); padding:16px; display:none; }
  .panel.show{ display:block; animation:pop .25s cubic-bezier(.2,.9,.3,1.2); }
  @keyframes pop{ from{ opacity:0; transform:translateY(-8px) scale(.98);} to{opacity:1;transform:none;} }
  .panel h3{ margin:2px 0 12px; font-size:13px; color:var(--gray); font-weight:600; text-transform:uppercase; letter-spacing:.03em; }
  .card{ background:rgba(255,255,255,.6); border:.5px solid var(--hair); border-radius:var(--r2); padding:12px; margin-bottom:10px; }

  label.fl{ font-size:11px; color:var(--gray); font-weight:600; display:block; margin:0 0 4px 2px; text-transform:uppercase; letter-spacing:.03em; }
  input,select{ width:100%; background:rgba(118,118,128,.1); border:none; color:var(--ink); border-radius:11px; padding:10px 12px;
    font:inherit; font-size:15px; outline:none; }
  input:focus,select:focus{ box-shadow:0 0 0 3px rgba(0,122,255,.25); }

  .btn{ border:none; border-radius:12px; padding:10px 14px; font:inherit; font-weight:600; font-size:14px; cursor:pointer;
    background:rgba(118,118,128,.14); color:var(--ink); transition:.15s; }
  .btn:active{ transform:scale(.96); }
  .btn.fill{ background:var(--green); color:#fff; box-shadow:0 4px 14px rgba(52,199,89,.35); }
  .btn.blue{ background:var(--blue); color:#fff; box-shadow:0 4px 14px rgba(0,122,255,.32); }
  .btn.tint{ background:rgba(52,199,89,.16); color:var(--green-d); }
  .btn.tint-b{ background:rgba(0,122,255,.14); color:var(--blue); }
  .btn.tint-o{ background:rgba(255,159,10,.16); color:#c2730a; }
  .btn.danger{ background:rgba(255,59,48,.14); color:var(--red); }
  .btn.on{ background:var(--gold); color:#3a2e00; box-shadow:0 4px 14px rgba(255,204,0,.4); }
  .row{ display:flex; gap:8px; }
  .row .btn{ flex:1; }
  .row.mb{ margin-bottom:10px; }

  .stepper{ display:flex; align-items:center; justify-content:space-between; background:rgba(118,118,128,.1); border-radius:12px; padding:4px; }
  .stepper .nav{ width:40px; height:36px; border:none; background:#fff; border-radius:9px; font-size:17px; font-weight:600; cursor:pointer;
    box-shadow:0 1px 3px rgba(0,0,0,.12); color:var(--ink); }
  .stepper .val{ font-weight:700; font-size:16px; font-variant-numeric:tabular-nums; }
  .stepper .val small{ font-weight:500; color:var(--gray); font-size:12px; }

  .readout{ text-align:center; padding:10px 0 6px; }
  .readout .lbl{ font-size:12px; color:var(--gray); font-weight:600; }
  .readout .big{ font-size:40px; font-weight:700; letter-spacing:-.03em; font-variant-numeric:tabular-nums; line-height:1.05; }
  .readout .big small{ font-size:17px; font-weight:600; color:var(--gray); }
  .kv{ display:flex; justify-content:space-between; align-items:center; font-size:14px; padding:7px 2px; border-top:.5px solid var(--hair); }
  .kv:first-child{ border-top:none; }
  .kv b{ font-variant-numeric:tabular-nums; font-weight:600; }
  .muted{ color:var(--gray); }

  .searchdrop{ display:none; position:absolute; left:12px; right:12px; z-index:20; margin-top:-6px; margin-bottom:8px;
    background:#fff; border:.5px solid var(--hair); border-radius:14px; box-shadow:0 12px 30px rgba(0,0,0,.18); overflow:hidden; max-height:260px; overflow-y:auto; }
  .searchdrop.show{ display:block; }
  .searchdrop .opt{ padding:11px 14px; font-size:14px; cursor:pointer; border-bottom:.5px solid var(--hair); display:flex; justify-content:space-between; gap:8px; }
  .searchdrop .opt:last-child{ border-bottom:none; }
  .searchdrop .opt:active,.searchdrop .opt.hl{ background:rgba(0,122,255,.1); }
  .searchdrop .opt .loc{ color:var(--gray); font-size:11px; font-variant-numeric:tabular-nums; }
  .searchdrop .more{ padding:8px 14px; font-size:12px; color:var(--gray); text-align:center; }
  .chips{ display:flex; gap:8px; flex-wrap:wrap; }
  .chip{ padding:8px 14px; border-radius:20px; background:rgba(118,118,128,.12); font-size:14px; font-weight:600; cursor:pointer; transition:.15s; }
  .chip.active{ background:var(--blue); color:#fff; box-shadow:0 3px 10px rgba(0,122,255,.32); }

  .shotlist{ font-size:13px; max-height:170px; overflow:auto; margin-top:4px; }
  .shotlist .s{ display:flex; justify-content:space-between; padding:8px 4px; border-top:.5px solid var(--hair); }
  .shotlist .s:first-child{ border:none; }
  .shotlist .s .n{ font-weight:600; }

  /* 마커 — 점 중심이 탭한 좌표에 정확히 위치 (xAnchor/yAnchor 0.5) */
  .pin{ position:relative; width:0; height:0; display:grid; place-items:center; }
  .pin .dot{ width:16px; height:16px; border-radius:50%; border:2px solid #fff; box-shadow:0 1px 5px rgba(0,0,0,.6); }
  .pin .num{ width:24px; height:24px; border-radius:50%; border:2.5px solid #fff; color:#fff; font-size:12px; font-weight:700;
    display:grid; place-items:center; box-shadow:0 1px 5px rgba(0,0,0,.6); }
  .pin .tag{ position:absolute; top:11px; left:50%; transform:translateX(-50%); white-space:nowrap;
    font-size:10px; font-weight:800; color:#fff; text-shadow:0 1px 3px rgba(0,0,0,.95); letter-spacing:.04em; }

  /* HUD */
  #hud{ position:absolute; right:14px; bottom:max(14px,env(safe-area-inset-bottom)); z-index:55; display:flex; flex-direction:column; gap:10px; }
  #hud .icbtn{ width:46px; height:46px; background:var(--glass-strong); backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px);
    box-shadow:var(--shadow); font-size:20px; }

  /* 스코어카드 / 목록 */
  #card,#browse{ position:absolute; inset:0; z-index:70; background:#f2f2f7; overflow:auto; padding:18px; display:none; }
  #card.show,#browse.show{ display:block; }
  .regionbar{ display:flex; gap:7px; overflow-x:auto; padding-bottom:10px; margin-bottom:4px; -webkit-overflow-scrolling:touch; }
  .regionbar .rc{ flex:0 0 auto; padding:7px 13px; border-radius:18px; background:#fff; border:.5px solid var(--hair); font-size:13px; font-weight:600;
    color:var(--ink2); cursor:pointer; white-space:nowrap; transition:.15s; }
  .regionbar .rc.active{ background:var(--green); color:#fff; border-color:var(--green); box-shadow:0 3px 10px rgba(52,199,89,.3); }
  .regionbar .rc .c{ opacity:.7; font-weight:500; margin-left:3px; font-size:11px; }
  #browseTable .grow{ display:none; }
  .clist .it{ display:flex; align-items:center; gap:10px; padding:13px 14px; border-bottom:.5px solid var(--hair); cursor:pointer; }
  .clist .it:last-child{ border-bottom:none; }
  .clist .it:active{ background:rgba(52,199,89,.08); }
  .clist .it .nm{ flex:1; font-weight:600; font-size:15px; }
  .clist .it .rg{ font-size:12px; color:var(--gray); background:rgba(118,118,128,.12); padding:2px 9px; border-radius:10px; }
  .clist .it .go{ color:var(--green); font-size:18px; font-weight:700; }
  .clist .empty{ padding:30px; text-align:center; color:var(--gray); }
  .cardhead{ display:flex; align-items:center; gap:10px; margin-bottom:14px; }
  .cardhead h2{ margin:0; font-size:22px; font-weight:700; letter-spacing:-.02em; }
  .tablewrap{ background:#fff; border-radius:18px; overflow:auto; box-shadow:0 1px 3px rgba(0,0,0,.06); }
  table{ border-collapse:collapse; width:100%; font-size:13px; }
  th,td{ padding:9px 8px; text-align:center; font-variant-numeric:tabular-nums; border-bottom:.5px solid var(--hair); }
  th{ background:#fafafa; color:var(--gray); font-weight:600; font-size:11px; position:sticky; top:0; }
  td.name,th.name{ text-align:left; white-space:nowrap; font-weight:600; padding-left:14px; }
  tr:last-child td{ border-bottom:none; }
  .under{ color:var(--blue); font-weight:700; } .over{ color:var(--red); } .even{ color:var(--gray); }

  #toast{ position:absolute; top:16px; left:50%; transform:translateX(-50%) translateY(-12px); z-index:200; opacity:0; pointer-events:none;
    background:rgba(28,28,30,.92); color:#fff; backdrop-filter:blur(12px); padding:9px 18px; border-radius:22px; font-size:14px; font-weight:600;
    box-shadow:0 8px 24px rgba(0,0,0,.3); transition:.25s cubic-bezier(.2,.9,.3,1.2); }
  #toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }

  @media (max-width:560px){
    .panel{ left:8px; right:8px; top:8px; width:auto; }
    header{ gap:8px; padding-left:12px; padding-right:12px; }
    .seg button{ padding:7px 11px; }
    .title span{ display:none; }
  }
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="title"><b>⛳ 골프 기록원</b><span id="courseSub">전국 562개 골프장 · <a href="index.html">좌표앱</a></span></div>
    <div class="grow"></div>
    <div class="seg" id="seg">
      <button data-mode="setup">코스</button>
      <button class="active" data-mode="round">기록</button>
      <button data-mode="card">스코어</button>
    </div>
    <button class="icbtn" id="browseBtn" title="골프장 목록">📋</button>
    <button class="icbtn" id="mapTypeBtn" title="지도 종류">🛰</button>
  </header>

  <div id="stage">
    <div id="map"></div>

    <!-- 코스 설정 -->
    <div class="panel" id="setupPanel">
      <h3>코스 설정</h3>
      <div class="card" style="position:relative">
        <label class="fl">골프장 검색 (전국 562곳)</label>
        <input id="courseSearch" placeholder="이름 입력 — 예: 성문안, 베어크리크" autocomplete="off" style="margin-bottom:10px" />
        <div id="searchDrop" class="searchdrop"></div>
        <label class="fl">내 코스</label>
        <select id="courseSel" style="margin-bottom:10px"></select>
        <label class="fl">이름</label>
        <input id="courseName" placeholder="코스 이름" style="margin-bottom:10px" />
        <div class="row mb">
          <button class="btn fill" id="newCourse">＋새 코스</button>
          <button class="btn tint" id="saveCourse">저장</button>
          <button class="btn danger" id="delCourse">삭제</button>
        </div>
      </div>
      <div class="card">
        <label class="fl">홀 / 파</label>
        <div class="stepper" style="margin-bottom:8px">
          <button class="nav" id="holePrev">‹</button>
          <span class="val"><b id="holeNo">1</b> <small>번 홀</small></span>
          <button class="nav" id="holeNext">›</button>
        </div>
        <div class="stepper">
          <button class="nav" id="parDown">－</button>
          <span class="val">파 <b id="parVal">4</b></span>
          <button class="nav" id="parUp">＋</button>
        </div>
      </div>
      <div class="row mb">
        <button class="btn tint-o" id="setTee">🚩 티 지정</button>
        <button class="btn tint" id="setGreen">⛳ 그린 지정</button>
      </div>
      <div class="card">
        <div class="kv"><span class="muted">홀 길이 (티→그린)</span><b id="holeLen">—</b></div>
      </div>
      <div class="row">
        <button class="btn tint-b" id="exportCourse">JSON 내보내기</button>
        <button class="btn" id="importCourse">불러오기</button>
      </div>
      <input type="file" id="importFile" accept="application/json" style="display:none" />
    </div>

    <!-- 경기 기록 -->
    <div class="panel" id="roundPanel">
      <h3>경기 기록</h3>
      <div class="card" style="position:relative">
        <label class="fl">골프장 검색 (전국 562곳)</label>
        <input id="rCourseSearch" placeholder="이름 입력 — 예: 성문안CC" autocomplete="off" style="margin-bottom:10px" />
        <div id="rSearchDrop" class="searchdrop"></div>
        <label class="fl">내 코스</label>
        <select id="roundCourse" style="margin-bottom:10px"></select>
        <label class="fl">선수 (쉼표로 구분)</label>
        <input id="playersInput" placeholder="홍길동, 김철수" style="margin-bottom:10px" />
        <button class="btn fill" style="width:100%" id="startRound">새 라운드 시작</button>
      </div>
      <div class="card">
        <div class="stepper" style="margin-bottom:10px">
          <button class="nav" id="rHolePrev">‹</button>
          <span class="val"><b id="rHoleNo">1</b><small> 번 · 파 </small><b id="rPar">4</b></span>
          <button class="nav" id="rHoleNext">›</button>
        </div>
        <div class="chips" id="playerChips"></div>
      </div>
      <div class="card">
        <div class="readout">
          <div class="lbl">남은 거리 → 그린</div>
          <div class="big" id="toPin">—</div>
        </div>
        <div class="kv"><span class="muted">직전 샷</span><b id="lastShot">—</b></div>
        <div class="kv"><span class="muted">현재 타수 (이 홀)</span><b id="curStrokes">0</b></div>
      </div>
      <div class="row mb">
        <button class="btn tint-o" id="penalty">＋ 벌타</button>
        <button class="btn" id="undoShot">↩ 되돌리기</button>
      </div>
      <div class="card">
        <label class="fl">샷 기록 — 지도에서 공 위치 탭</label>
        <div class="shotlist" id="shotList"></div>
      </div>
    </div>

    <!-- 스코어카드 -->
    <div id="card">
      <div class="cardhead">
        <h2 id="cardCourse">스코어카드</h2>
        <div class="grow"></div>
        <button class="btn tint-b" id="cardCsv">CSV</button>
        <button class="btn tint" id="cardJson">JSON</button>
      </div>
      <div class="tablewrap"><div id="cardTable"></div></div>
    </div>

    <!-- 골프장 목록 (지역별) -->
    <div id="browse">
      <div class="cardhead">
        <h2>골프장 목록</h2>
        <span class="muted" id="browseCount"></span>
        <div class="grow"></div>
        <button class="icbtn" id="browseClose">✕</button>
      </div>
      <input id="browseSearch" placeholder="🔍 골프장 이름 검색" autocomplete="off" style="margin-bottom:12px" />
      <div class="regionbar" id="regionBar"></div>
      <div class="tablewrap"><div id="browseTable"></div></div>
    </div>

    <div id="hud">
      <button class="icbtn" id="fitBtn" title="코스 전체 보기">⤢</button>
      <button class="icbtn" id="locBtn" title="내 위치">📍</button>
    </div>
    <div id="toast"></div>
  </div>
</div>

<script>

<script>
(function(){
  "use strict";
  var KEY=window.KAKAO_KEY;
  var SEED=JSON.parse(document.getElementById('seed').textContent);
  var CATALOG=JSON.parse(document.getElementById('catalog').textContent); // [{n,c:[lat,lng],b:[minLat,minLng,maxLat,maxLng]}]
  var map=null, mapReady=false;
  var ov={ tee:null, green:null, holeLine:null, shots:[], shotLine:null, boundary:null };

  // 저장 데이터
  var courses=load('golf_courses',[]);
  var round=load('golf_round',null);
  // 기본 코스(성문안CC) 보장
  (function(){
    var def=Object.assign({}, SEED.course, { boundary:SEED.boundary, center:SEED.center, bbox:SEED.bbox });
    var i=courses.findIndex(function(c){return c.id===def.id;});
    if(i<0) courses.unshift(def); else courses[i]=Object.assign(courses[i],{ boundary:def.boundary, center:def.center, bbox:def.bbox });
    save('golf_courses',courses);
  })();

  function load(k,d){ try{ var v=JSON.parse(localStorage.getItem(k)); return v==null?d:v; }catch(e){ return d; } }
  function save(k,v){ localStorage.setItem(k,JSON.stringify(v)); }

  var mode='round';
  var setup={ course:courses[0]||null, hole:1, pending:null };
  var rstate={ hole:1, player:0 };

  var $=function(id){return document.getElementById(id);};
  function toast(m){ var t=$('toast'); t.textContent=m; t.classList.add('show'); clearTimeout(t._t); t._t=setTimeout(function(){t.classList.remove('show');},1400); }

  function haversine(a,b){ var R=6371000,d=Math.PI/180; var dLat=(b.lat-a.lat)*d,dLng=(b.lng-a.lng)*d;
    var s=Math.sin(dLat/2)**2+Math.cos(a.lat*d)*Math.cos(b.lat*d)*Math.sin(dLng/2)**2; return 2*R*Math.asin(Math.sqrt(s)); }
  function fmtMY(m){ if(m==null) return '—'; return '<b>'+Math.round(m)+'</b><small> m · '+Math.round(m*1.09361)+' yd</small>'; }
  function fmtShort(m){ if(m==null) return '—'; return Math.round(m)+' m'; }

  // ───── Kakao ─────
  function initMap(){
    if(!KEY){ $('map').innerHTML='<div class="note">카카오 JavaScript 키 필요<br><code>KAKAO_KEY</code> + JS SDK 도메인 등록</div>'; return; }
    var s=document.createElement('script'); s.src="https://dapi.kakao.com/v2/maps/sdk.js?appkey="+KEY+"&autoload=false";
    s.onerror=function(){ $('map').innerHTML='<div class="note">카카오 SDK 로드 실패 — 도메인 등록 확인</div>'; };
    s.onload=function(){
      if(typeof kakao==='undefined'||!kakao.maps){ $('map').innerHTML='<div class="note">SDK 초기화 실패 — JS SDK 도메인 등록 확인</div>'; return; }
      kakao.maps.load(function(){
        var c=SEED.center;
        map=new kakao.maps.Map($('map'),{ center:new kakao.maps.LatLng(c.lat,c.lng), level:3 });
        map.setMapTypeId(kakao.maps.MapTypeId.HYBRID);
        mapReady=true;
        kakao.maps.event.addListener(map,'click',function(e){ onClick(e.latLng.getLat(),e.latLng.getLng()); });
        fitCourse(); renderAll();
      });
    };
    document.head.appendChild(s);
  }
  function LL(p){ return new kakao.maps.LatLng(p.lat,p.lng); }
  function clearOv(){ ['tee','green','holeLine','shotLine','boundary'].forEach(function(k){ if(ov[k]){ ov[k].setMap(null); ov[k]=null; } });
    ov.shots.forEach(function(m){m.setMap(null);}); ov.shots=[]; }
  function pin(p,color,tag,kind){
    var inner = kind==='num'
      ? '<div class="num" style="background:'+color+'">'+tag+'</div>'
      : '<div class="dot" style="background:'+color+'"></div>'+(tag?'<div class="tag">'+tag+'</div>':'');
    var m=new kakao.maps.CustomOverlay({ position:LL(p), xAnchor:0.5, yAnchor:0.5, zIndex:5, content:'<div class="pin">'+inner+'</div>' });
    m.setMap(map); return m;
  }
  function line(points,color,opacity,dash){ return new kakao.maps.Polyline({ map:map, path:points.map(LL), strokeColor:color,
    strokeWeight:4, strokeOpacity:opacity||0.9, strokeStyle:dash?'shortdash':'solid' }); }
  function drawBoundary(course){ if(course && course.boundary){ ov.boundary=new kakao.maps.Polygon({ map:map,
    path:course.boundary.map(function(a){return new kakao.maps.LatLng(a[0],a[1]);}),
    strokeWeight:2, strokeColor:'#ffffff', strokeOpacity:0.8, fillColor:'#34c759', fillOpacity:0.06 }); } }
  function fitTo(c){ if(!c||!mapReady||!c.bbox) return; var b=c.bbox;
    map.setBounds(new kakao.maps.LatLngBounds(new kakao.maps.LatLng(b.minLat,b.minLng), new kakao.maps.LatLng(b.maxLat,b.maxLng))); }
  function fitCourse(){ var c=(mode==='setup')?setup.course:(getCourse(round&&round.courseId)||setup.course); fitTo(c||courses[0]); }

  // ───── 클릭 ─────
  function onClick(lat,lng){
    var p={lat:lat,lng:lng};
    if(mode==='setup'){
      if(!setup.course){ toast('새 코스를 먼저 만드세요'); return; }
      var h=curHole();
      if(setup.pending==='tee'){ h.tee=p; setup.pending=null; }
      else if(setup.pending==='green'){ h.green=p; setup.pending=null; }
      else { toast('“티 지정” 또는 “그린 지정”을 누른 뒤 탭'); return; }
      save('golf_courses',courses); renderSetup();
    } else if(mode==='round'){
      if(!round){ toast('새 라운드를 시작하세요'); return; }
      playerScore().shots.push(p); persistRound(); renderRound();
    }
  }

  // ───── 코스 ─────
  function getCourse(id){ return courses.find(function(c){return c.id===id;}); }

  // ───── 전국 골프장 카탈로그 → 코스 자동 생성 ─────
  var PAR72=[4,4,5,3,4,4,3,4,5, 4,4,3,5,4,4,3,4,5]; // 12번=파3, 합 72
  function dest(lat,lng,brng,dist){ var R=6371000,d=dist/R,b=brng*Math.PI/180,la1=lat*Math.PI/180,lo1=lng*Math.PI/180;
    var la2=Math.asin(Math.sin(la1)*Math.cos(d)+Math.cos(la1)*Math.sin(d)*Math.cos(b));
    var lo2=lo1+Math.atan2(Math.sin(b)*Math.sin(d)*Math.cos(la1),Math.cos(d)-Math.sin(la1)*Math.sin(la2));
    return {lat:la2*180/Math.PI,lng:lo2*180/Math.PI}; }
  function bearing(a,b){ var la1=a.lat*Math.PI/180,la2=b.lat*Math.PI/180,dl=(b.lng-a.lng)*Math.PI/180;
    var y=Math.sin(dl)*Math.cos(la2),x=Math.cos(la1)*Math.sin(la2)-Math.sin(la1)*Math.cos(la2)*Math.cos(dl);
    return (Math.atan2(y,x)*180/Math.PI+360)%360; }
  function seedCourse(name,b){ // b=[minLat,minLng,maxLat,maxLng]
    var minLat=b[0],minLng=b[1],maxLat=b[2],maxLng=b[3], cen={lat:(minLat+maxLat)/2,lng:(minLng+maxLng)/2};
    var len={3:150,4:330,5:480}, holes=[];
    for(var i=0;i<18;i++){
      var col=i%6, rowi=Math.floor(i/6);
      var tee={ lat:+(minLat+(maxLat-minLat)*(rowi+1)/4).toFixed(6), lng:+(minLng+(maxLng-minLng)*(col+1)/7).toFixed(6) };
      var par=PAR72[i], g=dest(tee.lat,tee.lng,bearing(tee,cen),len[par]);
      holes.push({ n:i+1, par:par, tee:tee, green:{lat:+g.lat.toFixed(6),lng:+g.lng.toFixed(6)} });
    }
    return { id:'c'+Date.now().toString(36)+Math.floor(minLat*100%100), name:name, holes:holes,
      bbox:{minLat:minLat,maxLat:maxLat,minLng:minLng,maxLng:maxLng}, center:cen, seeded:true };
  }
  function updateSub(name){ $('courseSub').innerHTML=esc(name)+' · <a href="index.html">좌표앱</a>'; }
  function pickCatalog(item){
    var c=courses.find(function(x){return x.name===item.n;}) || (function(){ var nc=seedCourse(item.n,item.b); courses.push(nc); save('golf_courses',courses); return nc; })();
    setup.course=c; setup.hole=1; refreshSel();
    $('courseSel').value=c.id; $('roundCourse').value=c.id; $('courseName').value=c.name;
    updateSub(c.name); fitTo(c);
    if(mode==='round') renderRound(); else renderSetup();
    toast('⛳ '+c.name);
  }
  function runSearch(q,dropEl,onPick){
    q=q.trim().toLowerCase();
    if(!q){ dropEl.classList.remove('show'); return; }
    var res=CATALOG.filter(function(c){ return c.n.toLowerCase().indexOf(q)>=0; });
    var top=res.slice(0,30);
    dropEl.innerHTML=top.map(function(c){ var i=CATALOG.indexOf(c);
      return '<div class="opt" data-i="'+i+'"><span>'+esc(c.n)+'</span><span class="loc">'+c.c[0].toFixed(3)+', '+c.c[1].toFixed(3)+'</span></div>'; }).join('')
      + (res.length>30?'<div class="more">+ '+(res.length-30)+'곳 더… 더 입력</div>':(res.length?'':'<div class="more">검색 결과 없음</div>'));
    dropEl.classList.add('show');
    Array.prototype.forEach.call(dropEl.querySelectorAll('.opt'),function(o){ o.onclick=function(){ onPick(CATALOG[+o.dataset.i]); dropEl.classList.remove('show'); }; });
  }

  // ───── 지역별 목록 브라우저 ─────
  var REGIONS=['서울','인천','경기','강원','충북','충남','대전','세종','전북','전남','광주','경북','경남','대구','울산','부산','제주'];
  var browse={ region:'전체', q:'' };
  function buildRegionBar(){
    var bar=$('regionBar'); var counts={}; CATALOG.forEach(function(c){ counts[c.r]=(counts[c.r]||0)+1; });
    var items=[{r:'전체',n:CATALOG.length}].concat(REGIONS.filter(function(r){return counts[r];}).map(function(r){return {r:r,n:counts[r]};}));
    bar.innerHTML=items.map(function(it){ return '<div class="rc'+(it.r===browse.region?' active':'')+'" data-r="'+it.r+'">'+it.r+'<span class="c">'+it.n+'</span></div>'; }).join('');
    Array.prototype.forEach.call(bar.children,function(el){ el.onclick=function(){ browse.region=el.dataset.r; buildRegionBar(); renderBrowse(); }; });
  }
  function renderBrowse(){
    var q=browse.q.trim().toLowerCase();
    var list=CATALOG.filter(function(c){ return (browse.region==='전체'||c.r===browse.region) && (!q||c.n.toLowerCase().indexOf(q)>=0); });
    $('browseCount').textContent=list.length+'곳';
    var box=$('browseTable');
    if(!list.length){ box.innerHTML='<div class="clist"><div class="empty">검색 결과가 없습니다</div></div>'; return; }
    var html='<div class="clist">'+list.slice(0,400).map(function(c){ var i=CATALOG.indexOf(c);
      return '<div class="it" data-i="'+i+'"><span class="nm">'+esc(c.n)+'</span><span class="rg">'+c.r+'</span><span class="go">›</span></div>'; }).join('')
      + (list.length>400?'<div class="empty">+ '+(list.length-400)+'곳 더 — 검색으로 좁히세요</div>':'')+'</div>';
    box.innerHTML=html;
    Array.prototype.forEach.call(box.querySelectorAll('.it'),function(el){ el.onclick=function(){ pickCatalog(CATALOG[+el.dataset.i]); closeBrowse(); setMode('round'); }; });
  }
  function openBrowse(){ $('browse').classList.add('show'); buildRegionBar(); renderBrowse(); }
  function closeBrowse(){ $('browse').classList.remove('show'); }
  function curHole(){ var c=setup.course; if(!c) return null;
    var h=c.holes.find(function(x){return x.n===setup.hole;});
    if(!h){ h={n:setup.hole,par:4,tee:null,green:null}; c.holes.push(h); c.holes.sort(function(a,b){return a.n-b.n;}); }
    return h; }
  function holeOf(c,n){ return c.holes.find(function(h){return h.n===n;}); }
  function refreshSel(){ var a=$('courseSel'),b=$('roundCourse'); a.innerHTML=''; b.innerHTML='';
    courses.forEach(function(c){ [a,b].forEach(function(s){ var o=document.createElement('option'); o.value=c.id; o.textContent=c.name||'(이름없음)'; s.appendChild(o); }); });
    if(setup.course) a.value=setup.course.id; }
  function setBtns(){ $('setTee').classList.toggle('on',setup.pending==='tee'); $('setGreen').classList.toggle('on',setup.pending==='green'); }
  function renderSetup(fit){ if(!mapReady) return; clearOv(); drawBoundary(setup.course);
    var h=setup.course?curHole():null;
    $('holeNo').textContent=setup.hole; $('parVal').textContent=h?h.par:4;
    if(h&&h.tee) ov.tee=pin(h.tee,'#ff9f0a','TEE');
    if(h&&h.green) ov.green=pin(h.green,'#34c759','GREEN');
    if(h&&h.tee&&h.green){ ov.holeLine=line([h.tee,h.green],'#ffcc00',0.95); $('holeLen').innerHTML=fmtMY(haversine(h.tee,h.green));
      if(fit) map.setBounds(new kakao.maps.LatLngBounds(LL(h.tee),LL(h.green))); } else $('holeLen').textContent='—';
    setBtns(); }

  // ───── 라운드 ─────
  function playerScore(){ var hk=String(rstate.hole), pk=round.players[rstate.player];
    round.scores[hk]=round.scores[hk]||{}; round.scores[hk][pk]=round.scores[hk][pk]||{shots:[],penalty:0}; return round.scores[hk][pk]; }
  function persistRound(){ save('golf_round',round); }
  function strokesOf(sc){ return sc?(sc.shots.length+sc.penalty):0; }
  function renderChips(){ var box=$('playerChips'); box.innerHTML=''; if(!round) return;
    round.players.forEach(function(p,i){ var c=document.createElement('div'); c.className='chip'+(i===rstate.player?' active':''); c.textContent=p;
      c.onclick=function(){ rstate.player=i; renderRound(); }; box.appendChild(c); }); }
  function renderRound(){ if(!mapReady) return; clearOv();
    if(!round){ $('toPin').textContent='—'; $('shotList').innerHTML='<div class="muted" style="padding:8px 2px">라운드를 시작하세요</div>'; drawBoundary(setup.course||courses[0]); return; }
    var course=getCourse(round.courseId), h=course?holeOf(course,rstate.hole):null;
    drawBoundary(course);
    $('rHoleNo').textContent=rstate.hole; $('rPar').textContent=h?h.par:'-'; renderChips();
    if(h&&h.tee) ov.tee=pin(h.tee,'#ff9f0a','T');
    if(h&&h.green) ov.green=pin(h.green,'#34c759','G');
    if(h&&h.tee&&h.green) ov.holeLine=line([h.tee,h.green],'#ffcc00',0.5,true);
    var sc=playerScore(), path=[]; if(h&&h.tee) path.push(h.tee);
    sc.shots.forEach(function(s,i){ ov.shots.push(pin(s,'#007aff',String(i+1),'num')); path.push(s); });
    if(path.length>=2) ov.shotLine=line(path,'#007aff',0.95);
    var lastP=sc.shots.length?sc.shots[sc.shots.length-1]:(h&&h.tee?h.tee:null);
    $('toPin').innerHTML=(lastP&&h&&h.green)?fmtMY(haversine(lastP,h.green)):'—';
    var prevP=sc.shots.length>=2?sc.shots[sc.shots.length-2]:(h&&h.tee?h.tee:null);
    $('lastShot').innerHTML=(sc.shots.length&&prevP)?fmtMY(haversine(prevP,sc.shots[sc.shots.length-1])):'—';
    $('curStrokes').textContent=strokesOf(sc);
    var list=$('shotList'); list.innerHTML=''; var from=(h&&h.tee)?h.tee:null;
    sc.shots.forEach(function(s,i){ var d=from?haversine(from,s):null, to=(h&&h.green)?haversine(s,h.green):null;
      var r=document.createElement('div'); r.className='s';
      r.innerHTML='<span class="n">'+(i+1)+'타 '+(d!=null?fmtShort(d):'')+'</span><span class="muted">→그린 '+(to!=null?fmtShort(to):'')+'</span>';
      list.appendChild(r); from=s; });
    if(sc.penalty){ var pr=document.createElement('div'); pr.className='s'; pr.innerHTML='<span style="color:var(--orange);font-weight:600">벌타 +'+sc.penalty+'</span>'; list.appendChild(pr); }
    if(!sc.shots.length){ list.innerHTML='<div class="muted" style="padding:8px 2px">지도에서 공 위치를 탭하세요</div>';
      if(h&&h.tee&&h.green) map.setBounds(new kakao.maps.LatLngBounds(LL(h.tee),LL(h.green))); } }

  // ───── 스코어카드 ─────
  function renderCard(){ var box=$('cardTable');
    if(!round){ box.innerHTML='<div style="padding:24px;text-align:center;color:var(--gray)">진행 중인 라운드가 없습니다.</div>'; $('cardCourse').textContent='스코어카드'; return; }
    var course=getCourse(round.courseId); $('cardCourse').textContent=round.courseName||'스코어카드';
    var holes=course.holes.map(function(h){return h.n;}).sort(function(a,b){return a-b;});
    var parTot=course.holes.reduce(function(s,h){return s+h.par;},0);
    var html='<table><thead><tr><th class="name">선수</th>';
    holes.forEach(function(n){ var h=holeOf(course,n); html+='<th>'+n+'<br><span class="muted" style="font-size:10px">P'+(h?h.par:'-')+'</span></th>'; });
    html+='<th>합계</th><th>Par</th></tr></thead><tbody>';
    round.players.forEach(function(p){ html+='<tr><td class="name">'+esc(p)+'</td>'; var tot=0;
      holes.forEach(function(n){ var sc=round.scores[String(n)]&&round.scores[String(n)][p], st=sc?strokesOf(sc):0; tot+=st;
        var h=holeOf(course,n), rel=sc?st-(h?h.par:0):null, cls=rel==null?'':rel<0?'under':rel>0?'over':'even';
        html+='<td class="'+cls+'">'+(sc?st:'·')+'</td>'; });
      var rel=tot-parTot, cls=rel<0?'under':rel>0?'over':'even';
      html+='<td><b>'+tot+'</b></td><td class="'+cls+'"><b>'+(rel>0?'+':'')+rel+'</b></td></tr>'; });
    html+='</tbody></table>'; box.innerHTML=html; }
  function esc(s){ return String(s).replace(/[&<>"]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];}); }

  // ───── 모드 ─────
  function setMode(m){ mode=m;
    Array.prototype.forEach.call($('seg').children,function(b){ b.classList.toggle('active',b.dataset.mode===m); });
    $('setupPanel').classList.toggle('show',m==='setup');
    $('roundPanel').classList.toggle('show',m==='round');
    $('card').classList.toggle('show',m==='card');
    $('browse').classList.remove('show');
    if(m==='setup') renderSetup(); else if(m==='round') renderRound(); else renderCard(); }
  function renderAll(){ refreshSel(); setMode(mode); }

  // ───── 이벤트 ─────
  Array.prototype.forEach.call($('seg').children,function(b){ b.onclick=function(){ setMode(b.dataset.mode); }; });
  $('browseBtn').onclick=openBrowse; $('browseClose').onclick=closeBrowse;
  $('browseSearch').addEventListener('input',function(){ browse.q=this.value; renderBrowse(); });
  $('courseSearch').addEventListener('input',function(){ runSearch(this.value,$('searchDrop'),pickCatalog); });
  $('rCourseSearch').addEventListener('input',function(){ runSearch(this.value,$('rSearchDrop'),pickCatalog); });
  document.addEventListener('click',function(e){ if(!e.target.closest('#courseSearch,#searchDrop')) $('searchDrop').classList.remove('show');
    if(!e.target.closest('#rCourseSearch,#rSearchDrop')) $('rSearchDrop').classList.remove('show'); });
  $('newCourse').onclick=function(){ var name=$('courseName').value.trim()||('코스 '+(courses.length+1));
    var c={id:'c'+Date.now().toString(36),name:name,holes:[]}; courses.push(c); setup.course=c; setup.hole=1; save('golf_courses',courses);
    refreshSel(); $('courseSel').value=c.id; renderSetup(); toast('새 코스 생성'); };
  $('courseSel').onchange=function(){ setup.course=getCourse(this.value); setup.hole=1; $('courseName').value=setup.course?setup.course.name:''; if(setup.course) updateSub(setup.course.name); fitCourse(); renderSetup(); };
  $('saveCourse').onclick=function(){ if(!setup.course) return; setup.course.name=$('courseName').value.trim()||setup.course.name; save('golf_courses',courses); refreshSel(); $('courseSel').value=setup.course.id; toast('저장됨'); };
  $('delCourse').onclick=function(){ if(!setup.course||!confirm('이 코스를 삭제할까요?')) return; courses=courses.filter(function(c){return c!==setup.course;}); setup.course=courses[0]||null; setup.hole=1; save('golf_courses',courses); refreshSel(); renderSetup(); };
  $('holePrev').onclick=function(){ setup.hole=Math.max(1,setup.hole-1); setup.pending=null; renderSetup(true); };
  $('holeNext').onclick=function(){ setup.hole=Math.min(18,setup.hole+1); setup.pending=null; renderSetup(true); };
  $('parUp').onclick=function(){ var h=curHole(); if(h){ h.par=Math.min(6,h.par+1); save('golf_courses',courses); renderSetup(); } };
  $('parDown').onclick=function(){ var h=curHole(); if(h){ h.par=Math.max(3,h.par-1); save('golf_courses',courses); renderSetup(); } };
  $('setTee').onclick=function(){ if(!setup.course){toast('새 코스를 먼저');return;} setup.pending=setup.pending==='tee'?null:'tee'; setBtns(); if(setup.pending)toast('지도에서 티 위치를 탭'); };
  $('setGreen').onclick=function(){ if(!setup.course){toast('새 코스를 먼저');return;} setup.pending=setup.pending==='green'?null:'green'; setBtns(); if(setup.pending)toast('지도에서 그린(핀)을 탭'); };
  $('exportCourse').onclick=function(){ if(!setup.course)return; dl((setup.course.name||'course')+'.json',JSON.stringify(setup.course,null,2)); };
  $('importCourse').onclick=function(){ $('importFile').click(); };
  $('importFile').onchange=function(e){ var f=e.target.files[0]; if(!f)return; var r=new FileReader(); r.onload=function(){ try{ var c=JSON.parse(r.result); c.id='c'+Date.now().toString(36); courses.push(c); setup.course=c; setup.hole=1; save('golf_courses',courses); refreshSel(); $('courseSel').value=c.id; fitCourse(); renderSetup(); toast('불러옴'); }catch(err){ toast('JSON 파싱 실패'); } }; r.readAsText(f); };

  $('startRound').onclick=function(){ var cid=$('roundCourse').value, course=getCourse(cid);
    if(!course||!course.holes.length){ toast('코스를 먼저 설정하세요'); return; }
    var players=$('playersInput').value.split(',').map(function(s){return s.trim();}).filter(Boolean);
    if(!players.length){ toast('선수 이름을 입력하세요'); return; }
    if(round && !confirm('진행 중 라운드를 덮어쓸까요?')) return;
    round={courseId:cid,courseName:course.name,players:players,scores:{}}; rstate={hole:course.holes[0].n,player:0}; persistRound(); updateSub(course.name); fitCourse(); renderRound(); toast('라운드 시작 ⛳'); };
  function holeNav(dir){ if(!round)return; var c=getCourse(round.courseId), ns=c.holes.map(function(h){return h.n;}).sort(function(a,b){return a-b;}), i=ns.indexOf(rstate.hole);
    rstate.hole=ns[Math.min(ns.length-1,Math.max(0,i+dir))]; renderRound(); }
  $('rHolePrev').onclick=function(){ holeNav(-1); }; $('rHoleNext').onclick=function(){ holeNav(1); };
  $('penalty').onclick=function(){ if(!round)return; playerScore().penalty++; persistRound(); renderRound(); };
  $('undoShot').onclick=function(){ if(!round)return; var sc=playerScore(); if(sc.shots.length)sc.shots.pop(); else if(sc.penalty)sc.penalty--; persistRound(); renderRound(); };

  $('cardCsv').onclick=function(){ if(!round)return; var c=getCourse(round.courseId), ns=c.holes.map(function(h){return h.n;}).sort(function(a,b){return a-b;});
    var rows=[['player'].concat(ns.map(function(n){return 'H'+n;})).concat(['total']).join(',')];
    round.players.forEach(function(p){ var tot=0, cells=ns.map(function(n){ var sc=round.scores[String(n)]&&round.scores[String(n)][p], st=sc?strokesOf(sc):0; tot+=st; return st; }); rows.push([p].concat(cells).concat([tot]).join(',')); });
    dl('scorecard.csv',rows.join('\n')); };
  $('cardJson').onclick=function(){ if(!round)return; dl('round.json',JSON.stringify(round,null,2)); };

  function dl(name,text){ var b=new Blob([text],{type:'application/octet-stream'}); var a=document.createElement('a'); a.href=URL.createObjectURL(b); a.download=name; a.click(); setTimeout(function(){URL.revokeObjectURL(a.href);},1000); }
  $('mapTypeBtn').onclick=(function(){ var t=2; var ids=['ROADMAP','SKYVIEW','HYBRID']; return function(){ if(!mapReady)return; t=(t+1)%3; map.setMapTypeId(kakao.maps.MapTypeId[ids[t]]); toast(ids[t]); }; })();
  $('fitBtn').onclick=fitCourse;
  $('locBtn').onclick=function(){ if(!navigator.geolocation||!mapReady){toast('위치 미지원');return;} navigator.geolocation.getCurrentPosition(function(p){ map.setCenter(new kakao.maps.LatLng(p.coords.latitude,p.coords.longitude)); map.setLevel(2); },function(){toast('위치 거부됨');},{enableHighAccuracy:true}); };

  if(round){ var c=getCourse(round.courseId); if(c&&c.holes.length) rstate.hole=c.holes[0].n; }
  if(setup.course){ $('courseName').value=setup.course.name; updateSub((round&&round.courseName)||setup.course.name); }
  initMap();
})();
</script>
</body>
</html>
